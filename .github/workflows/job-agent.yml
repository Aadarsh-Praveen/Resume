# ── Job Application Agent ─────────────────────────────────────────────────────
#
# Runs the automated job collection + resume tailoring pipeline on a schedule.
#
# ┌─ FIRST-TIME SETUP ──────────────────────────────────────────────────────────
# │
# │  1. Merge this branch into main
# │     (GitHub only runs scheduled workflows from the default branch)
# │
# │  2. Add secrets at:
# │     GitHub repo → Settings → Secrets and variables → Actions → New secret
# │
# │  Required secrets:
# │    ANTHROPIC_API_KEY      console.anthropic.com → API Keys
# │    TELEGRAM_BOT_TOKEN     message @BotFather → /newbot
# │    TELEGRAM_CHAT_ID       api.telegram.org/bot<TOKEN>/getUpdates → chat.id
# │    NOTION_API_KEY         notion.so/profile/integrations → New integration
# │    NOTION_DATABASE_ID     from your Notion database URL (32-char hex ID)
# │
# │  Optional secrets (leave unset to skip that feature):
# │    APOLLO_API_KEY         apollo.io recruiter lookup
# │    APPLICANT_EMAIL        your email (logged to Notion)
# │    APPLICANT_NAME         your name (used in cold emails)
# │
# └─────────────────────────────────────────────────────────────────────────────

name: Job Agent

on:
  schedule:
    - cron: '0 */4 * * *'   # full cycle  — every 4 hours
    - cron: '0 9 * * *'     # daily digest — 09:00 UTC every day

  workflow_dispatch:         # manual trigger from the Actions tab
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full        # collect new jobs + process all pending  (default)
          - collect     # collect jobs only, no tailoring
          - process     # tailor already-collected jobs only
          - digest      # send Telegram daily digest right now
          - test-job    # end-to-end test with a synthetic JD

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # allows the job to commit the database back

    steps:
      # ── 1. Source code ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. System tools (LaTeX + PDF utilities) ───────────────────────────────
      #       Cached so subsequent runs skip the ~3 min download.
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-texlive-poppler-${{ runner.os }}-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-extra \
            texlive-fonts-extra \
            poppler-utils

      # ── 3. Python ─────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: job-agent/requirements.txt

      - name: Install Python dependencies
        run: pip install -r job-agent/requirements.txt

      # ── 4. Persist the SQLite job database between runs ──────────────────────
      #       Restores the latest snapshot so the agent knows which jobs it
      #       has already seen, preventing duplicate tailoring.
      - name: Restore job database
        uses: actions/cache@v4
        with:
          path: job-agent/db
          key: jobs-db-${{ github.run_id }}
          restore-keys: jobs-db-

      - name: Create required directories
        run: mkdir -p job-agent/db job-agent/resumes

      # ── 5. Work out which mode to run ────────────────────────────────────────
      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
            # 'full' uses no flag (agent.py default behaviour)
            [ "$MODE" = "full" ] && echo "args=" || echo "args=--${MODE}"
          elif [ "${{ github.event.schedule }}" = "0 9 * * *" ]; then
            echo "args=--digest"
          else
            echo "args="
          fi >> "$GITHUB_OUTPUT"

      # ── 6. Run the agent ──────────────────────────────────────────────────────
      - name: Run agent
        working-directory: job-agent
        env:
          # — Core —
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          # — Telegram alerts —
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # — Notion tracker —
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # — Optional —
          APOLLO_API_KEY:     ${{ secrets.APOLLO_API_KEY }}
          APPLICANT_EMAIL:    ${{ secrets.APPLICANT_EMAIL }}
          APPLICANT_NAME:     ${{ secrets.APPLICANT_NAME }}
          # — Paths (relative to job-agent/) —
          BASE_RESUME_PATH:   base_resume.tex
          RESUMES_DIR:        resumes
          DB_PATH:            db/jobs.db
        run: python agent.py ${{ steps.mode.outputs.args }}

      # ── 7. Save compiled PDFs as downloadable artifacts ──────────────────────
      #       Available in the Actions tab → select a run → Artifacts.
      #       Each PDF is kept for 30 days.
      - name: Upload PDF resumes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resumes-run-${{ github.run_number }}
          path: job-agent/resumes/*.pdf
          if-no-files-found: ignore
          retention-days: 30

      # ── 8. Upload the full run log ────────────────────────────────────────────
      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_number }}
          path: job-agent/agent.log
          if-no-files-found: ignore
          retention-days: 7
