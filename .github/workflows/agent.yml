name: Job Application Agent

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours
  workflow_dispatch:          # manual trigger from dashboard or GitHub UI
    inputs:
      mode:
        description: 'Run mode: collect | process | full'
        required: false
        default: 'full'

jobs:
  run-agent:
    runs-on: self-hosted      # your laptop — residential IP, local DB

    defaults:
      run:
        working-directory: job-agent

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: job-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "collect" ]; then
            python agent.py --collect
          elif [ "$MODE" = "process" ]; then
            python agent.py --process
          else
            python agent.py
          fi
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:         ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          HUNTER_API_KEY:         ${{ secrets.HUNTER_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          SHEETS_CREDENTIALS_JSON: ${{ secrets.SHEETS_CREDENTIALS_JSON }}
          SHEETS_SPREADSHEET_ID:  ${{ secrets.SHEETS_SPREADSHEET_ID }}
          DATABASE_URL:           ${{ secrets.DATABASE_URL }}
          RESUMES_DIR:            resumes

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs
          path: job-agent/agent.log
          retention-days: 7
