name: Job Application Agent

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours
  workflow_dispatch:          # manual trigger from dashboard or GitHub UI
    inputs:
      mode:
        description: 'Run mode: collect | process | full'
        required: false
        default: 'full'

jobs:
  run-agent:
    runs-on: self-hosted      # your laptop — residential IP, local DB

    defaults:
      run:
        working-directory: job-agent

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Install Playwright browser (for CSRF Workday tenants)
        if: ${{ github.event.inputs.mode != 'process' }}
        run: python3 -m playwright install chromium --with-deps

      - name: Run agent
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "collect" ]; then
            python3 agent.py --collect
          elif [ "$MODE" = "process" ]; then
            python3 agent.py --process
          else
            python3 agent.py
          fi
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          HUNTER_API_KEY:         ${{ secrets.HUNTER_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          SHEETS_CREDENTIALS_JSON: ${{ secrets.SHEETS_CREDENTIALS_JSON }}
          SHEETS_SPREADSHEET_ID:  ${{ secrets.SHEETS_SPREADSHEET_ID }}
          GCS_BUCKET:                          ${{ secrets.GCS_BUCKET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          APPLICANT_NAME:                      ${{ secrets.APPLICANT_NAME }}
          APPLICANT_FIRST_NAME:                ${{ secrets.APPLICANT_FIRST_NAME }}
          APPLICANT_LAST_NAME:                 ${{ secrets.APPLICANT_LAST_NAME }}
          APPLICANT_EMAIL:                     ${{ secrets.APPLICANT_EMAIL }}
          APPLICANT_PHONE:                     ${{ secrets.APPLICANT_PHONE }}
          APPLICANT_ROLE:                      ${{ secrets.APPLICANT_ROLE }}
          APPLICANT_LOCATION:                  ${{ secrets.APPLICANT_LOCATION }}
          APPLICANT_LINKEDIN:                  ${{ secrets.APPLICANT_LINKEDIN }}
          APPLICANT_LINKEDIN_URL:              ${{ secrets.APPLICANT_LINKEDIN_URL }}
          APPLICANT_GITHUB:                    ${{ secrets.APPLICANT_GITHUB }}
          NOTION_TOKEN:                        ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:                  ${{ secrets.NOTION_DATABASE_ID }}
          RESUMES_DIR:            resumes

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs
          path: job-agent/agent.log
          retention-days: 7
