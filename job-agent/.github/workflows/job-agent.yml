# .github/workflows/job-agent.yml
name: Job Agent
on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # manual trigger button

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r job-agent/requirements.txt
      - run: sudo apt-get install -y texlive-latex-base poppler-utils
      - run: python job-agent/agent.py --collect --process
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          RESUMES_DIR: /tmp/resumes
