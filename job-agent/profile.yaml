# ─────────────────────────────────────────────────────────────────────────────
# profile.yaml — Applicant personal facts for auto-apply form filling
#
# The job agent reads this file to answer factual questions on application
# forms (visa status, salary, start date, etc.) without hallucinating.
#
# Rules:
#   • Fill every field honestly — wrong visa/sponsorship answers can get you
#     filtered out or cause legal issues.
#   • Leave a field blank ("") if you genuinely don't know, and the agent
#     will send that question to the dashboard for you to answer manually.
#   • EEO fields are voluntary — "Prefer not to answer" is always safe.
# ─────────────────────────────────────────────────────────────────────────────

# ── Work authorization ────────────────────────────────────────────────────────
work_authorization:
  # Are you legally allowed to work in the US right now?
  authorized_us: "Yes"

  # Your current visa/status: Citizen / Green Card / H1B / H4-EAD / OPT / CPT / TN / L1 / Other
  visa_status: "H1B"

  # Will you need the employer to sponsor a visa now or in the future?
  needs_sponsorship: "Yes"

  # Free-text detail shown on forms that ask for explanation
  sponsorship_details: "Currently on H1B; open to employer transfer"

  # Used on forms asking "citizenship status" or "nationality"
  citizenship: "Indian national, H1B visa holder in the United States"

# ── Availability ──────────────────────────────────────────────────────────────
availability:
  # How soon can you start? Used on "earliest start date" fields.
  earliest_start_date: "2 weeks after offer acceptance"

  # Notice period at current employer
  notice_period: "2 weeks"

  # Willing to relocate? Yes / No / Open to discussion
  willing_to_relocate: "No"

  # Preferred work arrangement: Remote / Hybrid / Onsite / No preference
  preferred_work_mode: "Hybrid"

# ── Compensation ──────────────────────────────────────────────────────────────
compensation:
  # Base salary expectation (USD). Used on "salary expectation" fields.
  expected_salary_usd: "180000–220000"

  # Total comp (base + equity + bonus). Used on "total compensation" fields.
  expected_total_comp: "200000–250000 (base + equity)"

  open_to_negotiate: "Yes"

# ── Background ────────────────────────────────────────────────────────────────
background:
  # Highest degree: High School / Associate / Bachelors / Masters / PhD
  highest_degree: "Masters"
  field_of_study: "Computer Science"
  graduation_year: "2022"

  # Total years of professional experience (used on dropdown questions)
  years_total_experience: "3"

  # US security clearance: No / Secret / Top Secret / etc.
  us_security_clearance: "No"

  willing_to_undergo_background_check: "Yes"

# ── EEO — Equal Employment Opportunity (all voluntary) ───────────────────────
# These are optional government-required questions. Recommended: "Prefer not
# to answer" for anything you don't want to disclose. The agent will never
# guess these — it reads exactly what you write here.
eeo:
  gender: "Prefer not to answer"
  race_ethnicity: "Asian"
  veteran_status: "I am not a veteran"
  disability: "No, I don't have a disability"

# ── Canned answers ────────────────────────────────────────────────────────────
# Verbatim answers for common boilerplate questions.
# The agent uses these as-is (no Claude rewriting).
canned_answers:
  how_did_you_hear: "LinkedIn"
  why_leaving: "Seeking a larger-scale ML platform and infrastructure challenge"
